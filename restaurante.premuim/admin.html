<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; margin:0; }
    header { background:#111; color:#fff; padding:15px; text-align:center; }

    .container { padding:20px; }

    .item {
      background:#fff;
      padding:15px;
      margin-bottom:10px;
      border-radius:8px;
      box-shadow:0 0 5px rgba(0,0,0,0.1);
    }

    .total { font-weight:bold; margin-top:10px; }
  </style>
</head>
<body>

<header>
  <h1>Painel de Pedidos</h1>
</header>

<div class="container" id="pedidos"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔥 COLOCA SEU CONFIG AQUI
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJECT_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const pedidosRef = collection(db, "pedidos");

  onSnapshot(pedidosRef, (snapshot) => {
    const div = document.getElementById("pedidos");
    div.innerHTML = "";

    snapshot.forEach((doc) => {
      const p = doc.data();

      const itens = p.itens
        .map(i => `${i.nome} - R$ ${i.preco}`)
        .join("<br>");

      const data = p.criadoEm?.toDate?.().toLocaleString("pt-BR");

      div.innerHTML += `
        <div class="item">
          <strong>Pagamento:</strong> ${p.pagamento}<br><br>
          ${itens}<br>
          <div class="total">Total: R$ ${p.total}</div><br>
          <small>${data || ""}</small>
        </div>
      `;
    });
  });
</script>

</body>
</html>
